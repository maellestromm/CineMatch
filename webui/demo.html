<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="demo.css">
    <title>CineMatch Edge AI</title>
    <style>

    </style>
</head>
<body>

<div id="search-container">
    <label for="search-input"></label>
    <input type="text" id="search-input" placeholder="搜索电影标题...">
    <label for="csv-upload" class="upload-btn" title="上传 CSV 快速导入评分">📁</label>
    <input type="file" id="csv-upload" accept=".csv">
</div>

<div id="movie-grid"></div>

<div id="page-indicator">Page <span id="current-page">1</span> / <span id="total-pages">1</span> (Scroll or Use Arrow
    Keys)
</div>

<dialog id="movie-modal">
    <div class="close-btn" id="close-dialog-btn">×</div>
    <div class="modal-content" id="modal-inner-content">
    </div>
</dialog>

<template id="card-template">
    <div class="card">
        <div class="global-rating"></div>
        <div class="card-info">
            <div class="card-title"></div>
            <div class="stars-container">
                <span class="star" data-val="1">★</span>
                <span class="star" data-val="2">★</span>
                <span class="star" data-val="3">★</span>
                <span class="star" data-val="4">★</span>
                <span class="star" data-val="5">★</span>
            </div>
        </div>
    </div>
</template>

<template id="dialog-template">
    <div class="modal-top">
        <div class="modal-info">
            <h1 class="modal-title"></h1>
            <div class="modal-meta"></div>
            <p class="modal-ratings-text" style="color: #a8b2d1; margin-top: 20px;"></p>
        </div>
    </div>
    <div class="modal-bottom">
        <div class="scores-base">
            <h3 style="margin-top:0; color:#8892b0;">基座模型预测拆解</h3>
            <div class="score-row"><span>Deep AutoRec (神经网络)</span> <span class="score-autorec"></span></div>
            <div class="score-row"><span>SVD (矩阵分解)</span> <span class="score-svd"></span></div>
            <div class="score-row"><span>User-KNN (兴趣圈层)</span> <span class="score-userknn"></span></div>
            <div class="score-row"><span>Item-KNN (相似物品)</span> <span class="score-itemknn"></span></div>
            <div class="score-row"><span>Content-KNN (元数据)</span> <span class="score-contentknn"></span></div>
        </div>
        <div class="scores-meta">
            <h3 style="margin-top:0; color:#8892b0;">Meta-Learner 终极决策</h3>
            <div class="meta-circle">
                <div class="meta-score"></div>
                <div style="font-size:12px; color:#8892b0;">预测星级</div>
            </div>
        </div>
    </div>
</template>
<script type="importmap">
    {
      "imports": {
        "onnxruntime-web": "./node_modules/onnxruntime-web/dist/ort.mjs"
      }
    }
</script>
<script type="module">
    import {NN_Meta} from './models.js';

    let allMovies = [];
    let displayMovies = [];
    let userRatings = {};

    let currentPage = 0;
    let pageSize = 0;
    let isThrottled = false;

    const gridEl = document.getElementById('movie-grid');
    const dialog = document.getElementById('movie-modal');
    const dialogInner = document.getElementById('modal-inner-content');

    // 初始化模型引擎
    const recommender = new NN_Meta();
    let isModelReady = false;

    // 绑定关闭弹窗事件
    document.getElementById('close-dialog-btn').addEventListener('click', () => {
        dialog.close();
    });

    function calculateGrid() {
        const cardWidth = 220;
        const cardHeight = 330;
        const gap = 20;

        const availableWidth = window.innerWidth - 80;
        const availableHeight = window.innerHeight - 120;

        const cols = Math.floor((availableWidth + gap) / (cardWidth + gap));
        const rows = Math.floor((availableHeight + gap) / (cardHeight + gap));

        pageSize = cols * rows;

        gridEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        gridEl.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

        renderPage();
    }

    function sortAllMovies() {
        allMovies.sort((a, b) => {
            let av = a.global_avg
            let bv = b.global_avg
            if (userRatings[a.slug] !== undefined) av = userRatings[a.slug];
            else if (a.ai_scores.meta !== 0) av = a.ai_scores.meta;
            if (userRatings[b.slug] !== undefined) bv = userRatings[b.slug];
            else if (b.ai_scores.meta !== 0) bv = b.ai_scores.meta;
            return bv - av;
        });
    }

    async function sortMovies() {
        if (!isModelReady || Object.keys(userRatings).length < 3) {
            sortAllMovies();
            filterMovies();
            renderPage(1);
            return;
        }

        const aiResults = await recommender.get_recommendations(userRatings);

        allMovies.forEach(movie => {
            const result = aiResults[movie.slug];
            if (result) {
                movie.ai_scores.meta = result.meta;
                movie.ai_scores.svd = result.svd;
                movie.ai_scores.itemknn = result.itemknn;
                movie.ai_scores.autorec = result.autorec;
                movie.ai_scores.contentknn = result.contentknn;
                movie.ai_scores.userknn = result.userknn;
                // 接收后端传来的已看标记
                movie.isWatched = result.is_watched;
            }
        });

        // 🚀 核心修改：不再 filter，直接拿全量 allMovies 按照 meta 降序排列！
        sortAllMovies();
        filterMovies();
        renderPage(1);
    }

    function renderPage() {
        gridEl.innerHTML = '';
        const totalPages = Math.ceil(displayMovies.length / pageSize);

        if (currentPage >= totalPages) currentPage = Math.max(0, totalPages - 1);
        if (currentPage < 0) currentPage = 0;

        document.getElementById('current-page').innerText = currentPage + 1;
        document.getElementById('total-pages').innerText = totalPages || 1;

        const startIdx = currentPage * pageSize;
        const pageMovies = displayMovies.slice(startIdx, startIdx + pageSize);

        // 获取 DOM 模板
        const template = document.getElementById('card-template');

        pageMovies.forEach(movie => {
            // 深拷贝模板内容
            const clone = template.content.cloneNode(true);
            const card = clone.querySelector('.card');

            card.style.backgroundImage = `url('${movie.poster_url}')`;
            card.addEventListener('click', () => openModal(movie));

            clone.querySelector('.global-rating').innerText = `⭐ ${movie.global_avg}`;
            clone.querySelector('.card-title').innerText = movie.title;

            // 处理星星打分逻辑
// 处理星星打分逻辑 (支持 0.5 分增量)
            const stars = clone.querySelectorAll('.star');
            const myRating = userRatings[movie.slug] || 0;

            stars.forEach(star => {
                const val = parseInt(star.getAttribute('data-val'));

                // 1. 渲染当前状态
                star.classList.remove('full', 'half');
                if (myRating >= val) {
                    // 用户分数 >= 当前星星值 (例如打了 4.5 分，第 1,2,3,4 颗星全是 full)
                    star.classList.add('full');
                } else if (myRating === val - 0.5) {
                    // 用户分数正好落在当前星星的一半 (例如打了 4.5 分，第 5 颗星是 half)
                    star.classList.add('half');
                }

                // 2. 绑定带有空间位置感知的点击事件
                star.addEventListener('click', (e) => {
                    e.stopPropagation();

                    // 获取当前这颗星星在屏幕上的物理坐标和尺寸
                    const rect = star.getBoundingClientRect();
                    // 判断鼠标点击位置是否在星星的左半边
                    const isHalf = (e.clientX - rect.left) < (rect.width / 2);

                    // 如果点在左半边，就是 val - 0.5；点在右半边，就是满分 val
                    let finalVal = isHalf ? val - 0.5 : val;

                    // 【顺手加个体验优化】：如果用户再次点击了相同的分数，则取消该打分
                    if (userRatings[movie.slug] === finalVal) {
                        delete userRatings[movie.slug];
                    } else {
                        userRatings[movie.slug] = finalVal;
                    }

                    // 打分变更后重新跑预测和排序
                    sortMovies();
                });
            });

            gridEl.appendChild(clone);
        });
    }

    function RTD(num) {
        if (num < 0) return 'N/A';
        return Math.round(num * 1000) / 1000;
    }

    function openModal(movie) {
        dialogInner.innerHTML = ''; // 清空上一次的内容

        const template = document.getElementById('dialog-template');
        const clone = template.content.cloneNode(true);

        const top = clone.querySelector('.modal-top');
        top.style.backgroundImage = `url('${movie.poster_url}')`;
        clone.querySelector('.modal-title').innerText = movie.title;
        clone.querySelector('.modal-meta').innerText = `${movie.year} | 导演: ${movie.director}`;

        clone.querySelector('.modal-ratings-text').innerHTML = `大众平均评分: ⭐ ${movie.global_avg} <br> 您的打分: ${userRatings[movie.slug] ? '⭐ ' + userRatings[movie.slug] : '未评价'}`;

        clone.querySelector('.score-autorec').innerText = RTD(movie.ai_scores.autorec);
        clone.querySelector('.score-svd').innerText = RTD(movie.ai_scores.svd);
        clone.querySelector('.score-userknn').innerText = RTD(movie.ai_scores.userknn);
        clone.querySelector('.score-itemknn').innerText = RTD(movie.ai_scores.itemknn);
        clone.querySelector('.score-contentknn').innerText = RTD(movie.ai_scores.contentknn);
        clone.querySelector('.meta-score').innerText = RTD(movie.ai_scores.meta);

        dialogInner.appendChild(clone);

        // 使用原生的 showModal 唤出弹窗 (自带背景遮罩)
        dialog.showModal();
    }

    function turnPage(delta) {
        if (isThrottled) return;
        const totalPages = Math.ceil(displayMovies.length / pageSize);

        let newPage = currentPage + delta;
        if (newPage >= 0 && newPage < totalPages) {
            currentPage = newPage;
            renderPage();
            isThrottled = true;
            setTimeout(() => isThrottled = false, 50);
        }
    }

    let query = ''

    function filterMovies() {
        if (!query) {
            displayMovies = [...allMovies];
        } else {
            displayMovies = allMovies.filter(m => m.title.toLowerCase().includes(query));
        }

        renderPage();
    }

    window.addEventListener('wheel', (e) => {
        if (dialog.open) return; // 利用原生 open 属性判断
        turnPage(e.deltaY > 0 ? 1 : -1);
    });

    window.addEventListener('keydown', (e) => {
        if (dialog.open) return;
        if (e.key === 'ArrowDown' || e.key === 'PageDown') turnPage(1);
        if (e.key === 'ArrowUp' || e.key === 'PageUp') turnPage(-1);
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
        query = e.target.value.toLowerCase();
        currentPage = 0;
        filterMovies();
    });

    document.getElementById('csv-upload').addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (event) {
            const text = event.target.result;
            const lines = text.split('\n');
            let importCount = 0;

            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length >= 2) {
                    const slug = parts[0].trim();
                    const rating = parseFloat(parts[1].trim());
                    if (!isNaN(rating)) {
                        userRatings[slug] = rating;
                        importCount++;
                    }
                }
            });
            alert(`成功导入 ${importCount} 条评分！AI 引擎已重新排序。`);
            sortMovies();
        };
        reader.readAsText(file);
        e.target.value = '';
    });

    window.addEventListener('resize', () => {
        clearTimeout(window.resizeTimer);
        window.resizeTimer = setTimeout(calculateGrid, 200);
    });

    // ================= 系统启动序列 =================
    async function initSystem() {
        try {
            // 1. 初始化 AI 模型
            await recommender.initialize();
            isModelReady = true;

            // 2. 加载电影元数据
            const res = await fetch('./movie_database.json');
            const data = await res.json();

            allMovies = Object.entries(data).map(([slug, info]) => {
                return {
                    slug: slug,
                    title: info.title,
                    year: info.year,
                    director: info.director,
                    poster_url: info.poster_url,
                    global_avg: info.avg,
                    ai_scores: {
                        autorec: 0, svd: 0, userknn: 0, itemknn: 0, contentknn: 0, meta: 0
                    }
                };
            });
            allMovies.sort((a, b) => b.global_avg - a.global_avg);

            displayMovies = [...allMovies];

            // 3. 首次排序并渲染
            await sortMovies();
            calculateGrid();

        } catch (err) {
            console.error("系统初始化失败：", err);
        }
    }

    initSystem();
</script>
</body>
</html>
